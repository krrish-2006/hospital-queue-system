<!DOCTYPE html>
<html>
<head>
<title>Hospital Queue</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "San Francisco", sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* layout */
.container {
    width: 100%;
    max-width: 500px;
}

/* glass card */
.card {
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(25px);
    border-radius: 20px;
    padding: 30px;
    margin-bottom: 25px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    animation: fadeUp 0.5s ease;
}

/* title */
.title {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 10px;
}

/* inputs */
input, select {
    width: 100%;
    padding: 14px;
    margin-top: 12px;
    border-radius: 12px;
    border: none;
    background: rgba(255,255,255,0.1);
    color: white;
}

/* buttons */
button {
    width: 100%;
    padding: 14px;
    margin-top: 12px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-weight: 600;
    transition: 0.2s;
}

button:hover { transform: scale(1.03); }
button:active { transform: scale(0.98); }

.book-btn { background: #10b981; color: white; }
.next-btn { background: #ef4444; color: white; }
.cancel-btn { background: #facc15; color: black; width:auto; }

/* queue */
.queue-item {
    display: flex;
    justify-content: space-between;
    padding: 12px;
    margin-top: 10px;
    background: rgba(255,255,255,0.08);
    border-radius: 12px;
}

.now { background: #ef4444; }

/* login */
.login-box {
    text-align: center;
}

/* animation */
@keyframes fadeUp {
    from { opacity:0; transform: translateY(20px); }
    to { opacity:1; transform: translateY(0); }
}
</style>

</head>

<body>

<div class="container">

    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="card login-box">
        <h2>Welcome</h2>
        <p>Login to continue</p>
        <button onclick="loginGoogle()">🔐 Login with Google</button>
    </div>

    <!-- MAIN APP -->
    <div id="app" style="display:none;">

        <div class="card">
            <h2 class="title">Book Appointment</h2>

            <input id="name" placeholder="Your name">

            <select id="doctor">
                <option>General</option>
                <option>Cardiologist</option>
            </select>

            <button class="book-btn" onclick="book()">Book Now</button>

            <p id="result"></p>
        </div>

        <div class="card">
            <h2 class="title">Live Queue</h2>

            <button class="next-btn" onclick="next()">Next Patient</button>

            <ul id="queueList"></ul>
        </div>

    </div>

</div>

<script>

const API = "https://hospital-queue-system-ypl0.onrender.com";

// LOGIN
function loginGoogle() {
    window.location.href = `${API}/auth/google`;
}

// CHECK USER
async function checkUser() {
    const res = await fetch(`${API}/user`, {
        credentials: 'include'
    });

    const user = await res.json();

    if (user) {
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("app").style.display = "block";
        loadQueue();
    } else {
        document.getElementById("loginScreen").style.display = "block";
        document.getElementById("app").style.display = "none";
    }
}

// BOOK
async function book() {
    const name = document.getElementById("name").value;
    const doctor = document.getElementById("doctor").value;

    const res = await fetch(`${API}/book`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ name, doctor })
    });

    const data = await res.json();
    document.getElementById("result").innerText = "Token: " + data.token;

    loadQueue();
}

// NEXT
async function next() {
    const doctor = document.getElementById("doctor").value;

    await fetch(`${API}/next/${doctor}`, { method: 'POST' });

    loadQueue();
}

// LOAD QUEUE
async function loadQueue() {
    const doctor = document.getElementById("doctor").value;

    const res = await fetch(`${API}/queue/${doctor}`);
    const data = await res.json();

    const list = document.getElementById("queueList");
    list.innerHTML = "";

    data.forEach((p, i) => {
        const li = document.createElement("li");
        li.className = "queue-item";

        if (i === 0) li.classList.add("now");

        li.innerText = `${p.token} - ${p.name}`;
        list.appendChild(li);
    });
}

// INIT
checkUser();

</script>

</body>
</html>
