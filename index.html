<!DOCTYPE html>
<html>
<head>
<title>Hospital Queue</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #333;
}

.container {
    max-width: 500px;
    margin: 30px auto;
}

.card {
    background: rgba(255,255,255,0.9);
    padding: 20px;
    border-radius: 15px;
    margin-bottom: 20px;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 12px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.book-btn { background: #00c9a7; color: white; }
.next-btn { background: #ff4d4d; color: white; }
.cancel-btn { background: #ffc107; width: auto; }

.queue-item {
    display: flex;
    justify-content: space-between;
    padding: 10px;
    margin-top: 8px;
    background: white;
    border-radius: 10px;
}

.now { background: #ff4d4d; color: white; }
</style>
</head>

<body>

<div class="container">

<div class="card">
    <button onclick="loginGoogle()">🔐 Login with Google</button>
    <h2>📅 Book Appointment</h2>

    <input id="name" placeholder="Enter your name">

    <select id="doctor">
        <option value="Pulmonologist">Pulmonologist</option>
        <option value="Cardiologist">Cardiologist</option>
    </select>

    <button class="book-btn" onclick="book()">Book Now</button>

    <h3 id="result"></h3>
</div>

<div class="card">
    <h2>🩺 Live Queue</h2>

    <div id="nowServing"></div>

    <button class="next-btn" onclick="nextPatient()">Next Patient</button>

    <select id="doctorQueue">
        <option value="Pulmonologist">Pulmonologist</option>
        <option value="Cardiologist">Cardiologist</option>
    </select>

    <ul id="queueList" style="list-style:none; padding:0;"></ul>
</div>

</div>

<!-- ✅ FIXED SOCKET -->
<script src="/socket.io/socket.io.js"></script>

<script>
const API = "https://hospital-queue-system-yp10.onrender.com";
const socket = io(API);

let currentDoctor = document.getElementById('doctorQueue').value;

// 🔐 LOGIN
function loginGoogle() {
    window.location.href = `${API}/auth/google`;
}

// 🔐 CHECK USER
async function checkUser() {
    const res = await fetch(`${API}/user`, { credentials: 'include' });
    const user = await res.json();

    if (user) {
        document.getElementById('name').value = user.displayName;
        document.getElementById('name').style.display = "none";
        document.getElementById('result').innerText =
            "Logged in as: " + user.displayName;
        window.loggedInEmail = user.emails[0].value;
    }
}

// 📥 LOAD QUEUE
async function loadInitial() {
    const res = await fetch(`${API}/queue/${currentDoctor}`, {
        credentials: 'include'
    });
    const data = await res.json();
    renderQueue(data);
}

// 🔄 SOCKET UPDATE
socket.onAny((event, data) => {
    if (event === `queue-${currentDoctor}`) {
        renderQueue(data);
    }
});

// 📅 BOOK
async function book() {
    const resUser = await fetch(`${API}/user`, { credentials: 'include' });
    const user = await resUser.json();

    if (!user) {
        alert("Please login first");
        return;
    }

    const doctor = document.getElementById('doctor').value;

    const res = await fetch(`${API}/book`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ doctor })
    });

    const data = await res.json();
    document.getElementById('result').innerText =
        `Token Number: ${data.token}`;

    loadInitial();
}

// 🎨 RENDER
function renderQueue(data) {
    const list = document.getElementById('queueList');
    list.innerHTML = "";

    document.getElementById('nowServing').innerText =
        data.length ? "Now Serving: " + data[0].token : "No patients";

    data.forEach((p, index) => {
        const li = document.createElement('li');
        li.classList.add("queue-item");

        if (index === 0) li.classList.add("now");

        const text = document.createElement('span');
        text.innerText = `${p.token} - ${p.name}`;

        li.appendChild(text);

        if (p.email === window.loggedInEmail) {
            const btn = document.createElement('button');
            btn.innerText = "Cancel";
            btn.classList.add("cancel-btn");
            btn.onclick = () => cancelBooking(p._id);
            li.appendChild(btn);
        }

        list.appendChild(li);
    });
}

// ⏭ NEXT
async function nextPatient() {
    await fetch(`${API}/next/${currentDoctor}`, {
        method: 'POST',
        credentials: 'include'
    });
}

// ❌ CANCEL
async function cancelBooking(id) {
    await fetch(`${API}/cancel`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ id, doctor: currentDoctor })
    });
}

// 🔁 CHANGE DOCTOR
document.getElementById('doctorQueue').addEventListener('change', (e) => {
    currentDoctor = e.target.value;
    loadInitial();
});

// 🚀 START
checkUser();
loadInitial();
</script>

</body>
</html>
