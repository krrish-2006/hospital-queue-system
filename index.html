<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hospital Queue</title>
<style>
    :root {
        --bg: #f5f6f8;
        --panel: rgba(255, 255, 255, 0.8);
        --panel-solid: #ffffff;
        --text: #0f1720;
        --muted: #5b6472;
        --line: rgba(15, 23, 32, 0.08);
        --shadow: 0 24px 60px rgba(15, 23, 32, 0.12);
        --radius-xl: 32px;
        --radius-lg: 22px;
        --radius-md: 16px;
        --blue: #2563eb;
        --blue-deep: #1746a2;
        --red: #dc2626;
        --green: #16a34a;
        --yellow: #facc15;
    }

    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        min-height: 100vh;
        font-family: "SF Pro Display", "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
        color: var(--text);
        background:
            radial-gradient(circle at top left, rgba(37, 99, 235, 0.12), transparent 30%),
            radial-gradient(circle at top right, rgba(15, 23, 32, 0.08), transparent 24%),
            linear-gradient(180deg, #fbfbfc 0%, #eef1f5 100%);
    }

    body::before,
    body::after {
        content: "";
        position: fixed;
        inset: auto;
        width: 340px;
        height: 340px;
        border-radius: 50%;
        filter: blur(30px);
        z-index: 0;
        pointer-events: none;
    }

    body::before {
        top: -100px;
        right: -80px;
        background: rgba(37, 99, 235, 0.14);
    }

    body::after {
        bottom: -120px;
        left: -80px;
        background: rgba(15, 23, 32, 0.08);
    }

    .shell {
        position: relative;
        z-index: 1;
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 40px 0;
    }

    .app-frame {
        display: grid;
        gap: 28px;
        align-items: center;
    }

    .login-shell {
        min-height: calc(100vh - 80px);
        display: grid;
        grid-template-columns: 1.2fr 0.9fr;
        gap: 28px;
        align-items: stretch;
    }

    .hero-panel,
    .login-panel,
    .card {
        background: var(--panel);
        backdrop-filter: blur(24px);
        border: 1px solid rgba(255, 255, 255, 0.7);
        box-shadow: var(--shadow);
    }

    .hero-panel {
        border-radius: var(--radius-xl);
        padding: 48px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        overflow: hidden;
        position: relative;
        min-height: 680px;
        background:
            linear-gradient(135deg, rgba(255, 255, 255, 0.92), rgba(241, 245, 249, 0.74)),
            linear-gradient(120deg, rgba(37, 99, 235, 0.12), rgba(15, 23, 32, 0.03));
    }

    .hero-panel::after {
        content: "";
        position: absolute;
        right: -40px;
        bottom: -40px;
        width: 320px;
        height: 320px;
        background: radial-gradient(circle, rgba(37, 99, 235, 0.18), transparent 68%);
        pointer-events: none;
    }

    .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(15, 23, 32, 0.06);
        color: var(--muted);
        font-size: 13px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        width: fit-content;
    }

    .eyebrow-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--blue);
        box-shadow: 0 0 0 8px rgba(37, 99, 235, 0.12);
    }

    .hero-copy h1,
    .hero-copy p {
        margin: 0;
        font-size: clamp(2.6rem, 6vw, 5.2rem);
        line-height: 0.98;
        letter-spacing: -0.05em;
        max-width: 9ch;
    }

    .hero-copy p {
        margin-bottom: 12px;
        color: rgba(15, 23, 32, 0.72);
    }

    .login-panel {
        border-radius: var(--radius-xl);
        padding: 34px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        min-height: 680px;
    }

    .brand {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 36px;
    }

    .brand-mark {
        width: 46px;
        height: 46px;
        border-radius: 14px;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #111827, #334155);
        color: white;
        font-weight: 700;
    }

    .brand small {
        display: block;
        color: var(--muted);
        margin-top: 4px;
    }

    .login-card {
        background: var(--panel-solid);
        border-radius: 28px;
        padding: 30px;
        border: 1px solid var(--line);
        box-shadow: 0 18px 45px rgba(15, 23, 32, 0.08);
    }

    .login-card h2 {
        margin: 0 0 12px;
        font-size: 2rem;
        letter-spacing: -0.04em;
    }

    .login-card p {
        margin: 0 0 26px;
        color: var(--muted);
        line-height: 1.7;
    }

    .google-button {
        width: 100%;
        border: none;
        border-radius: 18px;
        background: #111827;
        color: white;
        padding: 17px 20px;
        font-size: 1rem;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 14px;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        box-shadow: 0 16px 32px rgba(17, 24, 39, 0.18);
    }

    .google-button:hover {
        transform: translateY(-1px);
        background: #0b1220;
        box-shadow: 0 18px 36px rgba(17, 24, 39, 0.24);
    }

    .google-button:active {
        transform: translateY(0);
    }

    .google-mark {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: white;
        color: #4285f4;
        font-size: 0.9rem;
        font-weight: 700;
    }

    .main-app {
        display: none;
    }

    .dashboard-shell {
        display: grid;
        gap: 28px;
    }

    .app-hero {
        position: relative;
        overflow: hidden;
        padding: 44px 46px;
        border-radius: 38px;
        background:
            radial-gradient(circle at top right, rgba(37, 99, 235, 0.14), transparent 28%),
            linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(241, 244, 248, 0.84));
        border: 1px solid rgba(255, 255, 255, 0.85);
        box-shadow: var(--shadow);
        backdrop-filter: blur(24px);
    }

    .app-hero::after {
        content: "";
        position: absolute;
        right: -40px;
        top: -40px;
        width: 220px;
        height: 220px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(15, 23, 32, 0.08), transparent 68%);
        pointer-events: none;
    }

    .app-nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        margin-bottom: 56px;
    }

    .app-nav-brand {
        display: flex;
        align-items: center;
        gap: 14px;
    }

    .app-nav-brand strong {
        display: block;
        font-size: 1rem;
        letter-spacing: -0.03em;
    }

    .app-nav-brand span {
        color: var(--muted);
        font-size: 0.9rem;
    }

    .app-nav-actions {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
    }

    .pill {
        border-radius: 999px;
        padding: 11px 16px;
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid var(--line);
        color: var(--muted);
        backdrop-filter: blur(14px);
    }

    .app-hero-copy {
        max-width: 780px;
    }

    .app-hero-copy h2 {
        margin: 0;
        font-size: clamp(2.8rem, 8vw, 5.4rem);
        line-height: 0.95;
        letter-spacing: -0.07em;
        font-weight: 600;
    }

    .app-hero-copy p {
        margin: 18px 0 0;
        color: var(--muted);
        font-size: 1rem;
        letter-spacing: -0.02em;
    }

    .card {
        border-radius: 34px;
        padding: 34px;
    }

    .dashboard-grid {
        display: grid;
        grid-template-columns: minmax(340px, 420px) minmax(0, 1fr);
        gap: 28px;
        align-items: start;
    }

    .booking-panel,
    .queue-panel {
        min-height: 100%;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.9), rgba(244, 247, 250, 0.82));
    }

    .title {
        margin: 0;
        font-size: 1.1rem;
        letter-spacing: -0.03em;
        font-weight: 600;
        color: var(--muted);
        text-transform: uppercase;
    }

    .subtle {
        margin: 0 0 20px;
        color: var(--muted);
        line-height: 1.6;
    }

    label {
        display: block;
        margin-top: 16px;
        font-size: 0.9rem;
        color: var(--muted);
    }

    input,
    select {
        width: 100%;
        margin-top: 8px;
        padding: 15px 16px;
        border-radius: var(--radius-md);
        border: 1px solid rgba(15, 23, 32, 0.1);
        background: rgba(255, 255, 255, 0.88);
        color: var(--text);
        outline: none;
        font-size: 0.98rem;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus,
    select:focus {
        border-color: rgba(37, 99, 235, 0.45);
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.08);
    }

    button {
        border: none;
        border-radius: 16px;
        padding: 14px 18px;
        font-size: 0.97rem;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s ease, opacity 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
        transform: translateY(-1px);
    }

    button:active {
        transform: translateY(0);
    }

    .primary-btn {
        width: 100%;
        margin-top: 18px;
        background: linear-gradient(135deg, #2563eb, #1d4ed8);
        color: white;
        box-shadow: 0 16px 32px rgba(37, 99, 235, 0.22);
    }

    .primary-btn:disabled,
    select:disabled {
        background: #dbe1ea;
        color: #7a8596;
        box-shadow: none;
        cursor: not-allowed;
    }

    .logout-btn {
        background: white;
        border: 1px solid rgba(15, 23, 32, 0.08);
        color: var(--text);
    }

    .next-btn {
        background: var(--red);
        color: white;
        width: 100%;
        margin: 14px 0 12px;
    }

    .cancel-btn {
        width: auto;
        background: rgba(250, 204, 21, 0.2);
        color: #7c5d00;
        padding: 10px 14px;
    }

    .result {
        min-height: 24px;
        margin-top: 16px;
        color: var(--blue-deep);
        font-weight: 600;
        font-size: 0.92rem;
    }

    .queue-list {
        list-style: none;
        padding: 0;
        margin: 0;
        display: grid;
        gap: 12px;
    }

    .queue-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        padding: 18px 20px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid rgba(15, 23, 32, 0.05);
    }

    .queue-item.now {
        background: linear-gradient(180deg, rgba(37, 99, 235, 0.14), rgba(255, 255, 255, 0.92));
        border-color: rgba(37, 99, 235, 0.2);
    }

    .queue-text strong {
        display: block;
        margin-bottom: 4px;
    }

    .queue-text span {
        color: var(--muted);
        font-size: 0.9rem;
    }

    .empty-state {
        padding: 18px;
        border-radius: 22px;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.72);
        border: 1px dashed rgba(15, 23, 32, 0.12);
        text-align: center;
    }

    .app-card-header {
        display: grid;
        gap: 10px;
        margin-bottom: 28px;
    }

    .app-card-header strong {
        font-size: 2.2rem;
        line-height: 0.98;
        letter-spacing: -0.06em;
        font-weight: 600;
    }

    .queue-badge {
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(15, 23, 32, 0.05);
        color: var(--muted);
        font-size: 0.86rem;
        width: fit-content;
    }

    .booking-stack {
        display: grid;
        gap: 18px;
    }

    .booking-meta {
        display: grid;
        gap: 10px;
        padding: 20px;
        border-radius: 26px;
        background: rgba(255, 255, 255, 0.84);
        border: 1px solid rgba(15, 23, 32, 0.05);
    }

    .name-line {
        margin: 0;
        font-size: 1rem;
        color: var(--text);
    }

    .name-line span {
        color: var(--muted);
    }

    .queue-panel-top {
        display: flex;
        justify-content: space-between;
        align-items: end;
        gap: 16px;
        margin-bottom: 20px;
    }

    .queue-panel-top strong {
        display: block;
        font-size: 3rem;
        line-height: 0.92;
        letter-spacing: -0.07em;
        font-weight: 600;
    }

    .queue-surface {
        padding: 20px;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.62);
        border: 1px solid rgba(15, 23, 32, 0.04);
    }

    @media (max-width: 980px) {
        .login-shell {
            grid-template-columns: 1fr;
        }

        .hero-panel,
        .login-panel {
            min-height: auto;
        }

        .dashboard-grid {
            grid-template-columns: 1fr;
        }

    }

    @media (max-width: 680px) {
        .shell {
            width: min(100% - 20px, 100%);
            padding: 18px 0 24px;
        }

        .hero-panel,
        .login-panel,
        .card {
            padding: 22px;
            border-radius: 24px;
        }

        .app-hero {
            padding: 28px 24px;
        }

        .app-nav {
            flex-direction: column;
            align-items: flex-start;
        }
    }
</style>
</head>
<body>
    <div class="shell">
        <div id="loginScreen" class="login-shell">
            <section class="hero-panel">
                <div class="hero-copy">
                    <p>Modernized hospital booking.</p>
                    <h1>Care access, refined for modern clinics.</h1>
                </div>
            </section>

            <aside class="login-panel">
                <div class="brand">
                    <div class="brand-mark">HQ</div>
                    <div>
                        <strong>Hospital Queue</strong>
                        <small>Smart access for patients and staff</small>
                    </div>
                </div>

                <div class="login-card">
                    <button class="google-button" onclick="loginGoogle()">
                        <span class="google-mark">G</span>
                        Continue with Google
                    </button>
                </div>
            </aside>
        </div>

        <div id="app" class="main-app">
            <div class="dashboard-shell">
                <section class="app-hero">
                    <div class="app-nav">
                        <div class="app-nav-brand">
                            <div class="brand-mark">HQ</div>
                            <div>
                                <strong>Hospital Queue</strong>
                                <span id="userBadge">Not signed in</span>
                            </div>
                        </div>
                        <div class="app-nav-actions">
                            <button class="logout-btn" onclick="logout()">Logout</button>
                        </div>
                    </div>

                    <div class="app-hero-copy">
                        <h2>Book with clarity. Track with ease.</h2>
                    </div>
                </section>

                <div class="dashboard-grid">
                    <section class="card booking-panel">
                        <div class="app-card-header">
                            <h3 class="title">Book</h3>
                            <strong>Appointment</strong>
                        </div>

                        <div class="booking-stack">
                            <div class="booking-meta">
                                <p id="nameLine" class="name-line"><span>Name - </span>Patient Name</p>
                            </div>

                            <div class="booking-meta">
                                <label for="doctor">Doctor</label>
                                <select id="doctor" onchange="loadQueue()">
                                    <option>Pulmonologist</option>
                                    <option>Cardiologist</option>
                                </select>
                            </div>

                            <button id="bookBtn" class="primary-btn" onclick="book()">Book Now</button>
                            <div id="result" class="result"></div>
                        </div>
                    </section>

                    <section class="card queue-panel">
                        <div class="queue-panel-top">
                            <div>
                                <div class="title">Queue</div>
                                <strong>Live</strong>
                            </div>
                            <div id="queueBadge" class="queue-badge">Pulmonologist</div>
                        </div>

                        <button id="nextBtn" class="next-btn" onclick="next()">Next Patient</button>

                        <div class="queue-surface">
                            <ul id="queueList" class="queue-list"></ul>
                        </div>
                    </section>
                </div>
            </div>
        </div>
    </div>

<script>
const API = "https://hospital-queue-system-ypl0.onrender.com";
const DOCTOR_EMAIL = "krrishjgd@gmail.com";
let userBookings = [];

function loginGoogle() {
    window.location.href = `${API}/auth/google`;
}

function getSelectedDoctor() {
    return document.getElementById("doctor").value;
}

async function refreshBookingState() {
    const doctors = Array.from(document.querySelectorAll("#doctor option")).map((option) => option.value);
    const queues = await Promise.all(
        doctors.map(async (doctor) => {
            const res = await fetch(`${API}/queue/${encodeURIComponent(doctor)}`);
            return res.json();
        })
    );

    userBookings = queues
        .flat()
        .filter((patient) => patient?.isOwner);

    updateBookingUI();
}

function updateBookingUI() {
    const hasBooking = userBookings.length > 0;
    const bookBtn = document.getElementById("bookBtn");
    const doctorSelect = document.getElementById("doctor");
    const result = document.getElementById("result");

    bookBtn.disabled = hasBooking;
    doctorSelect.disabled = hasBooking;

    if (hasBooking) {
        result.innerText = "Booking already active.";
    } else if (result.innerText === "Booking already active.") {
        result.innerText = "";
    }
}

function setAuthenticatedUI(user) {
    const email = user?.emails?.[0]?.value || "";
    const displayName = user?.displayName || "Patient";

    window.loggedInEmail = email;

    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("app").style.display = "grid";
    document.getElementById("userBadge").innerText = "Signed in";
    document.getElementById("nameLine").innerHTML = `<span>Name - </span>${displayName}`;
    document.getElementById("nextBtn").style.display = email === DOCTOR_EMAIL ? "block" : "none";
    refreshBookingState().finally(loadQueue);
}

function setLoggedOutUI() {
    window.loggedInEmail = "";
    userBookings = [];
    document.getElementById("app").style.display = "none";
    document.getElementById("loginScreen").style.display = "grid";
}

async function checkUser() {
    try {
        const res = await fetch(`${API}/user`, {
            credentials: "include"
        });

        const user = await res.json();

        if (user) {
            setAuthenticatedUI(user);
        } else {
            setLoggedOutUI();
        }
    } catch (error) {
        console.error("Unable to verify user", error);
        setLoggedOutUI();
    }
}

async function book() {
    const doctor = getSelectedDoctor();

    try {
        const res = await fetch(`${API}/book`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify({ doctor })
        });

        const data = await res.json();

        if (!res.ok) {
            throw new Error(data.error || "Unable to book appointment");
        }

        document.getElementById("result").innerText = `Token confirmed: ${data.token}`;
        await refreshBookingState();
        loadQueue();
    } catch (error) {
        document.getElementById("result").innerText = error.message;
    }
}

async function next() {
    const doctor = getSelectedDoctor();

    try {
        const res = await fetch(`${API}/next/${encodeURIComponent(doctor)}`, {
            method: "POST",
            credentials: "include"
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
            throw new Error(data.error || "Unable to advance queue");
        }

        loadQueue();
    } catch (error) {
        document.getElementById("result").innerText = error.message;
    }
}

async function cancelBooking(id) {
    const doctor = getSelectedDoctor();

    try {
        const res = await fetch(`${API}/cancel`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify({ id, doctor })
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
            throw new Error(data.error || "Unable to cancel booking");
        }

        userBookings = [];
        updateBookingUI();
        document.getElementById("result").innerText = "Booking cancelled.";
        await refreshBookingState();
        loadQueue();
    } catch (error) {
        document.getElementById("result").innerText = error.message;
    }
}

async function loadQueue() {
    const doctor = getSelectedDoctor();
    const list = document.getElementById("queueList");
    const queueBadge = document.getElementById("queueBadge");

    try {
        const res = await fetch(`${API}/queue/${encodeURIComponent(doctor)}`);
        const data = await res.json();

        list.innerHTML = "";
        queueBadge.innerText = doctor;

        if (!Array.isArray(data) || data.length === 0) {
            list.innerHTML = '<li class="empty-state">No patients in queue yet for this doctor.</li>';
            return;
        }

        data.forEach((patient, index) => {
            const li = document.createElement("li");
            li.className = "queue-item";

            if (index === 0) {
                li.classList.add("now");
            }

            const text = document.createElement("div");
            text.className = "queue-text";
            const tokenLabel = patient.isOwner && patient.name
                ? `Token ${patient.token} - ${patient.name}`
                : `Token ${patient.token}`;
            text.innerHTML = `<strong>${tokenLabel}</strong><span>${index === 0 ? "Now serving" : "Waiting in queue"}</span>`;

            li.appendChild(text);

            const canCancel = Boolean(patient.isOwner);

            if (canCancel) {
                const btn = document.createElement("button");
                btn.className = "cancel-btn";
                btn.innerText = "Cancel";
                btn.onclick = () => cancelBooking(patient._id);
                li.appendChild(btn);
            }

            list.appendChild(li);
        });
    } catch (error) {
        console.error("Unable to load queue", error);
        list.innerHTML = '<li class="empty-state">Unable to load the queue right now.</li>';
    }
}

function logout() {
    fetch(`${API}/logout`, {
        credentials: "include"
    }).finally(() => {
        setLoggedOutUI();
    });
}

checkUser();
</script>
</body>
</html>
